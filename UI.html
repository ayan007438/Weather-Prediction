<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherPredict - Advanced Weather Forecasting</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Search Bar */
        .search-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            outline: none;
            background: rgba(255,255,255,0.8);
        }

        .search-btn {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        /* Current Weather Card */
        .current-weather {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .current-weather::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #4facfe, #00f2fe, #43e97b);
        }

        .weather-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .temp {
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .location {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #34495e;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .detail-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* Forecast Cards */
        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .forecast-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
        }

        .forecast-day {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .forecast-temp {
            font-size: 1.8rem;
            font-weight: 500;
            color: #34495e;
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid #4facfe;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .temp {
                font-size: 3rem;
            }
            
            .search-container {
                flex-direction: column;
                gap: 15px;
            }
            
            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Prediction Badge */
        .prediction-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-bolt"></i> WeatherPredict</h1>
            <p>AI-Powered Weather Forecasting System</p>
        </div>

        <!-- Search -->
        <div class="search-container">
            <input type="text" class="search-input" id="locationInput" placeholder="Enter city name or zip code...">
            <button class="search-btn" onclick="getWeather()">
                <i class="fas fa-search"></i> Predict
            </button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating prediction...</p>
        </div>

        <!-- Current Weather -->
        <div class="current-weather" id="currentWeather" style="display: none;">
            <div class="prediction-badge">
                <i class="fas fa-brain"></i> AI Prediction
            </div>
            <div class="weather-icon" id="currentIcon"></div>
            <div class="temp" id="currentTemp">--°</div>
            <div class="location" id="currentLocation">--</div>
            <div class="weather-details">
                <div class="detail-item">
                    <div class="detail-value" id="humidity">--</div>
                    <div class="detail-label">Humidity</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="wind">--</div>
                    <div class="detail-label">Wind</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="pressure">--</div>
                    <div class="detail-label">Pressure</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="visibility">--</div>
                    <div class="detail-label">Visibility</div>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="forecast-container" id="forecast" style="display: none;">
            <!-- Forecast cards will be populated by JS -->
        </div>
    </div>

    <script>
        // Sample weather data structure (replace with your API)
        const sampleData = {
            current: {
                temp: 72,
                feelsLike: 74,
                condition: "Partly Cloudy",
                icon: "fas fa-cloud-sun",
                humidity: 65,
                wind: "12 mph",
                pressure: "1013 hPa",
                visibility: "10 km"
            },
            forecast: [
                { day: "Tomorrow", temp: "75° / 62°", icon: "fas fa-sun" },
                { day: "Wed", temp: "78° / 65°", icon: "fas fa-cloud-sun" },
                { day: "Thu", temp: "82° / 68°", icon: "fas fa-cloud-rain" },
                { day: "Fri", temp: "79° / 66°", icon: "fas fa-bolt" },
                { day: "Sat", temp: "76° / 63°", icon: "fas fa-sun" }
            ]
        };

        function getWeather() {
            const location = document.getElementById('locationInput').value || 'San Francisco';
            const loading = document.getElementById('loading');
            const currentWeather = document.getElementById('currentWeather');
            const forecast = document.getElementById('forecast');

            // Show loading
            loading.style.display = 'block';
            currentWeather.style.display = 'none';
            forecast.style.display = 'none';

            // Simulate API call
            setTimeout(() => {
                displayWeather(location, sampleData);
                loading.style.display = 'none';
            }, 1500);
        }

        function displayWeather(location, data) {
            // Current weather
            document.getElementById('currentLocation').textContent = location;
            document.getElementById('currentTemp').textContent = data.current.temp + '°';
            document.getElementById('currentIcon').innerHTML = `<i class="${data.current.icon}"></i>`;
            document.getElementById('humidity').textContent = data.current.humidity + '%';
            document.getElementById('wind').textContent = data.current.wind;
            document.getElementById('pressure').textContent = data.current.pressure;
            document.getElementById('visibility').textContent = data.current.visibility;

            document.getElementById('currentWeather').style.display = 'block';

            // Forecast
            const forecastContainer = document.getElementById('forecast');
            forecastContainer.innerHTML = '';
            data.forecast.forEach(item => {
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${item.day}</div>
                    <div class="forecast-icon"><i class="${item.icon}"></i></div>
                    <div class="forecast-temp">${item.temp}</div>
                `;
                forecastContainer.appendChild(card);
            });
            forecastContainer.style.display = 'grid';
        }

        // Load default weather on page load
        window.onload = () => {
            getWeather();
        };

        // Allow Enter key in search
        document.getElementById('locationInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getWeather();
            }
        });
    </script>
</body>
</html>
